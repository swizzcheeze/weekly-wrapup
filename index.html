<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Weekly Wrap-Up · AI, Agents & Audio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080c12;
  --text: #e6edf3;
  --text-dim: #7d8590;
  --accent: #58d5ff;
  --accent-dim: #2b7a96;
  --accent-glow: rgba(88,213,255,0.12);
  --blue: #58a6ff;
  --green: #3fb950;
  --orange: #f0883e;
  --purple: #bc8cff;
  --border: #1a2433;
  --border-light: #212f40;
}

/* ── Keyframes ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0%, 100% { opacity: 0.03; }
  50%      { opacity: 0.06; }
}
@keyframes pulse-ring {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.5); opacity: 0; }
}

/* ── Base ── */
html {
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  overflow-y: scroll;
  height: 100%;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ── Grid background ── */
.grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(88,213,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,213,255,0.035) 1px, transparent 1px);
  background-size: 64px 64px;
  animation: shimmer 8s ease-in-out infinite;
}
.grid-bg::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 50% 45% at 50% 35%, rgba(88,213,255,0.05) 0%, transparent 70%);
}

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 32px;
  background: rgba(8,12,18,0.88);
  backdrop-filter: blur(16px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.topbar h1 {
  font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
  background: linear-gradient(135deg, var(--accent), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar-controls { display: flex; align-items: center; gap: 14px; }
.topbar select {
  background: rgba(17,24,34,0.8); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; cursor: pointer;
  outline: none; transition: border-color 0.2s;
}
.topbar select:hover, .topbar select:focus { border-color: var(--accent-dim); }
.counter {
  font-size: 11px; color: var(--text-dim);
  min-width: 48px; text-align: center;
  font-variant-numeric: tabular-nums; letter-spacing: 0.5px;
}

/* ── Edition label (top-right) ── */
.edition-label {
  position: fixed; top: 58px; right: 32px; z-index: 99;
  font-size: 11px; color: var(--accent-dim);
  letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  pointer-events: none;
}

/* ── Sections (full-viewport snap panels) ── */
.section {
  position: relative;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 32px 60px;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  z-index: 1;
}
.section-inner {
  width: 100%;
  max-width: 720px;
  display: flex; flex-direction: column;
  align-items: flex-start;
}

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 4px 12px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  margin-bottom: 20px;
}
.badge.facts   { background: rgba(88,166,255,0.1); color: var(--blue); border: 1px solid rgba(88,166,255,0.18); }
.badge.opinion { background: rgba(240,136,62,0.1); color: var(--orange); border: 1px solid rgba(240,136,62,0.18); }
.badge.try-it  { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid rgba(63,185,80,0.18); }

/* ── Kicker ── */
.kicker {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent);
  margin-bottom: 10px;
}

/* ── Typography ── */
.section h2 {
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 700; line-height: 1.15;
  margin-bottom: 24px;
}
.section h3 {
  font-size: 17px; font-weight: 600; color: var(--text);
  margin: 24px 0 8px;
}
.section p, .section li {
  font-size: 15px; line-height: 1.8; color: var(--text-dim);
}
.section ul, .section ol { padding-left: 20px; margin: 10px 0; }
.section li { margin-bottom: 6px; }
.section strong { color: var(--text); font-weight: 600; }
.section a {
  color: var(--accent); text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.section a:hover { border-bottom-color: var(--accent); }
.section em.term { font-style: normal; color: var(--purple); font-weight: 500; }
.section code {
  background: rgba(88,213,255,0.07);
  border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px;
  font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--accent);
}

/* ── Cover section ── */
.cover .section-inner { align-items: flex-start; }
.cover h2 {
  font-size: clamp(30px, 5.5vw, 56px);
  background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 28px;
}
.cover-date {
  font-size: 11px; color: var(--accent-dim);
  letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;
  margin-bottom: 8px;
}
.cover-summary { list-style: none; padding: 0; margin: 0; }
.cover-summary li {
  font-size: 15px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text-dim); line-height: 1.65;
}
.cover-summary li:last-child { border-bottom: none; }

/* ── Opinion blocks ── */
.who { font-weight: 700; color: var(--accent); font-size: 14px; display: block; margin-bottom: 4px; }
.opinion-block {
  margin-bottom: 20px; padding: 14px 18px;
  border-left: 3px solid var(--accent-dim);
  background: var(--accent-glow);
  border-radius: 0 8px 8px 0;
}
.opinion-block:last-child { margin-bottom: 0; }

/* ── Code / prompt blocks ── */
pre.prompt {
  background: rgba(88,213,255,0.03);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 16px 20px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px; line-height: 1.65; color: #c8d6e0;
  position: relative; margin: 14px 0;
  overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  width: 100%;
  transition: border-color 0.2s;
}
pre.prompt:hover { border-color: var(--accent-dim); }
.copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: rgba(88,213,255,0.08);
  border: 1px solid var(--border-light);
  color: var(--text-dim);
  padding: 4px 10px; border-radius: 6px;
  font-size: 10px; cursor: pointer;
  transition: all 0.2s; font-weight: 500;
}
.copy-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

/* ── Sources ── */
.source-list { list-style: none; padding: 0; }
.source-list li { margin-bottom: 6px; font-size: 13px; }
.source-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--accent-dim);
  margin: 18px 0 8px;
}
.source-section-title:first-child { margin-top: 0; }
.source-notes {
  margin-top: 20px; padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-dim); font-style: italic;
}

/* ── Scroll indicator (bottom arrow) ── */
.scroll-hint {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 11px; letter-spacing: 1px;
  opacity: 0.5; pointer-events: none;
  animation: fade-up 1s ease 1s forwards;
  opacity: 0;
}
.scroll-hint svg {
  animation: fade-up 0.6s ease infinite alternate;
  animation-delay: 0.5s;
}

/* ── Progress bar (right edge) ── */
.progress-track {
  position: fixed; right: 6px; top: 50%; transform: translateY(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 8px;
  padding: 8px 4px;
}
.progress-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border-light);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.progress-dot:hover { background: var(--accent-dim); transform: scale(1.5); }
.progress-dot.active {
  background: var(--accent);
  transform: scale(1.4);
  box-shadow: 0 0 8px rgba(88,213,255,0.5);
}
.progress-dot.active::after {
  content: '';
  position: absolute; inset: -5px;
  border-radius: 50%;
  border: 1px solid rgba(88,213,255,0.25);
  animation: pulse-ring 2s ease-in-out infinite;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .section { padding: 70px 20px 50px; }
  .topbar { padding: 12px 16px; }
  .progress-track { right: 3px; }
  .edition-label { right: 16px; top: 52px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<div class="topbar">
  <h1>The Weekly Wrap-Up</h1>
  <div class="topbar-controls">
    <select id="editionPicker"></select>
    <span class="counter" id="counter">1 / 1</span>
  </div>
</div>

<div class="edition-label" id="editionLabel"></div>

<div class="progress-track" id="progressTrack"></div>

<div id="stage"></div>

<script src="editions.js"></script>
<script>
(function() {
  'use strict';

  var stage       = document.getElementById('stage');
  var picker      = document.getElementById('editionPicker');
  var counter     = document.getElementById('counter');
  var progressEl  = document.getElementById('progressTrack');
  var editionLabel = document.getElementById('editionLabel');

  var edIndex  = 0;
  var sections = [];
  var isScrolling = false;

  // ── Build picker ──
  EDITIONS.forEach(function(ed, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = ed.label;
    picker.appendChild(opt);
  });
  picker.addEventListener('change', function() {
    edIndex = +picker.value;
    render();
  });

  // ── Render ──
  function render() {
    var ed = EDITIONS[edIndex];
    editionLabel.textContent = ed.date;
    var html = buildSections(ed);
    stage.innerHTML = html;

    // Copy buttons
    stage.querySelectorAll('pre.prompt').forEach(function(pre) {
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var txt = pre.textContent.replace(/Copy\s*$/, '');
        var done = function() { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 1500); };
        if (navigator.clipboard) navigator.clipboard.writeText(txt).then(done).catch(done); else done();
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // Progress dots
    progressEl.innerHTML = '';
    sections = stage.querySelectorAll('.section');
    sections.forEach(function(_, i) {
      var d = document.createElement('div');
      d.className = 'progress-dot' + (i === 0 ? ' active' : '');
      (function(idx) {
        d.addEventListener('click', function() {
          sections[idx].scrollIntoView({ behavior: 'smooth' });
        });
      })(i);
      progressEl.appendChild(d);
    });

    updateProgress();
    counter.textContent = '1 / ' + sections.length;
  }

  // ── Build section HTML ──
  function buildSections(ed) {
    var out = '';

    // Cover
    out += '<section class="section cover">';
    out += '<div class="section-inner">';
    out += '<span class="badge facts">Edition</span>';
    out += '<div class="cover-date">' + ed.date + '</div>';
    out += '<h2>' + ed.headline + '</h2>';
    out += '<ul class="cover-summary">';
    ed.summary.forEach(function(s) { out += '<li>' + s + '</li>'; });
    out += '</ul>';
    out += '<div class="scroll-hint"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 10l-4-4h8z"/></svg>scroll</div>';
    out += '</div></section>';

    // Content slides
    ed.slides.forEach(function(s) {
      out += '<section class="section">';
      out += '<div class="section-inner">';
      out += '<span class="badge ' + s.type + '">' + (s.type === 'try-it' ? 'Try It' : s.type) + '</span>';
      out += '<div class="kicker">' + s.kicker + '</div>';
      out += '<h2>' + s.title + '</h2>';
      out += s.html;
      out += '</div></section>';
    });

    // Sources
    var src = ed.sources;
    var srcHtml = '';
    if (src.videos && src.videos.length) {
      srcHtml += '<div class="source-section-title">Videos</div><ul class="source-list">';
      src.videos.forEach(function(v) { srcHtml += '<li><a href="' + v.url + '" target="_blank" rel="noopener">' + v.title + '</a></li>'; });
      srcHtml += '</ul>';
    }
    if (src.articles && src.articles.length) {
      srcHtml += '<div class="source-section-title">Articles</div><ul class="source-list">';
      src.articles.forEach(function(a) { srcHtml += '<li><a href="' + a.url + '" target="_blank" rel="noopener">' + a.title + '</a></li>'; });
      srcHtml += '</ul>';
    }
    if (src.x && src.x.length) {
      srcHtml += '<div class="source-section-title">X / Twitter</div><ul class="source-list">';
      src.x.forEach(function(x) { srcHtml += '<li><a href="' + x.url + '" target="_blank" rel="noopener">' + x.title + '</a></li>'; });
      srcHtml += '</ul>';
    }
    if (src.notes) srcHtml += '<div class="source-notes">' + src.notes + '</div>';

    out += '<section class="section">';
    out += '<div class="section-inner">';
    out += '<div class="kicker">Sources</div>';
    out += '<h2>What we read this week</h2>';
    out += srcHtml;
    out += '</div></section>';

    return out;
  }

  // ── Progress tracking via IntersectionObserver ──
  function updateProgress() {
    var dots = progressEl.querySelectorAll('.progress-dot');
    var currentIdx = 0;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && entry.intersectionRatio > 0.5) {
          var idx = Array.prototype.indexOf.call(sections, entry.target);
          if (idx !== -1) currentIdx = idx;
        }
      });

      dots.forEach(function(d, i) {
        d.classList.toggle('active', i === currentIdx);
      });
      counter.textContent = (currentIdx + 1) + ' / ' + sections.length;
    }, {
      threshold: [0.5]
    });

    sections.forEach(function(s) { observer.observe(s); });
  }

  // ── Keyboard nav ──
  document.addEventListener('keydown', function(e) {
    var idx = 0;
    sections.forEach(function(s, i) {
      var r = s.getBoundingClientRect();
      if (r.top < window.innerHeight / 2) idx = i;
    });

    if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      if (idx < sections.length - 1) sections[idx + 1].scrollIntoView({ behavior: 'smooth' });
    }
    if (e.key === 'ArrowUp' || e.key === 'PageUp') {
      e.preventDefault();
      if (idx > 0) sections[idx - 1].scrollIntoView({ behavior: 'smooth' });
    }
  });

  // ── Init ──
  render();
})();
</script>
</body>
</html>
